version: '3.8'

services:
  chatbot:
    build: .
    container_name: whatsapp-recruitment-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chatbot-network

  celery_worker:
    build: .
    container_name: chatbot-celery
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--pool=gevent", "--concurrency=100", "--loglevel=INFO"]
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - chatbot-network

  # Redis for message queue (Celery broker) and caching
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge

volumes:
  redis-data:
